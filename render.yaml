services:
  - type: web
    name: buddy-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: BUD_E_SYSTEM_PROMPT_FILE
        value: prompts/child_learning_companion_system_prompt.txt
      - key: MOONSHOT_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        value: https://api.moonshot.cn/v1
      - key: KIMI_MODEL
        value: moonshot-v1-8k
      - key: DEEPGRAM_API_KEY
        sync: false
